name: Performance Monitoring

on:
  pull_request:
    branches: [preview]
  deployment_status:

permissions:
  contents: read
  issues: write
  pull-requests: write
  deployments: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.deployment.id || github.ref }}
  cancel-in-progress: true

jobs:
  local-production-lighthouse:
    name: Local Production Lighthouse
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build application
        run: pnpm run build:ci
        env:
          RESEND_API_KEY: 'dummy_key_for_build'

      - name: Start production server
        run: pnpm start:prod > /tmp/local-production-server.log 2>&1 &

      - name: Wait for localhost server
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://localhost:3000/ > /dev/null; then
              echo "Local production server is ready"
              exit 0
            fi
            echo "Waiting for local production server... (${attempt}/60)"
            sleep 2
          done
          echo "Local production server did not become ready in time"
          echo "--- Server Log ---"
          cat /tmp/local-production-server.log
          exit 1

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.cjs'
          urls: |
            http://localhost:3000/
          uploadArtifacts: false
          temporaryPublicStorage: true

      - name: Upload Lighthouse Results
        uses: actions/upload-artifact@v7
        if: always() && steps.lighthouse.outcome != 'skipped'
        with:
          name: lighthouse-reports-local-production-${{ github.run_id }}
          path: |
            ${{ steps.lighthouse.outputs.resultsPath || '.lighthouseci' }}/*.html
            ${{ steps.lighthouse.outputs.resultsPath || '.lighthouseci' }}/*.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 30

      - name: Comment PR with local production Lighthouse results
        uses: actions/github-script@v9
        env:
          LIGHTHOUSE_RESULTS_PATH: ${{ steps.lighthouse.outputs.resultsPath }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const resultsPath = process.env.LIGHTHOUSE_RESULTS_PATH || path.join(process.cwd(), '.lighthouseci');
            if (!fs.existsSync(resultsPath)) {
              core.info(`No Lighthouse results directory found at ${resultsPath}; skipping performance comment.`);
              return;
            }

            const jsonFiles = fs
              .readdirSync(resultsPath)
              .filter(file => file.endsWith('.json'));

            for (const file of jsonFiles) {
              const result = JSON.parse(fs.readFileSync(path.join(resultsPath, file), 'utf8'));
              const lhr = result.lhr || result;

              if (!lhr.categories || !lhr.audits) {
                core.info(`Skipping ${file}; it is not a Lighthouse result file.`);
                continue;
              }

              const scores = lhr.categories;
              const scorePercent = category => Math.round(category.score * 100);
              const auditNumber = auditName => lhr.audits[auditName]?.numericValue;
              const lcp = auditNumber('largest-contentful-paint');
              const fid = auditNumber('max-potential-fid');
              const cls = auditNumber('cumulative-layout-shift');
              const testedUrl = 'http://localhost:3000/';
              const runUrl =
                context.serverUrl && context.repo?.owner && context.repo?.repo && context.runId
                  ? `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                  : null;
              const reportTitle = 'Performance Report: Local Production Build';

              const commentLines = [
                `## ${reportTitle}`,
                '',
                '| Metric | Score | Status |',
                '|--------|-------|--------|',
                `| Performance | ${scorePercent(scores.performance)} | ${scores.performance.score >= 0.9 ? 'Pass' : scores.performance.score >= 0.8 ? 'Warn' : 'Fail'} |`,
                `| Accessibility | ${scorePercent(scores.accessibility)} | ${scores.accessibility.score >= 0.9 ? 'Pass' : 'Fail'} |`,
                `| Best Practices | ${scorePercent(scores['best-practices'])} | ${scores['best-practices'].score >= 0.9 ? 'Pass' : 'Fail'} |`,
                `| SEO | ${scorePercent(scores.seo)} | ${scores.seo.score >= 0.9 ? 'Pass' : 'Fail'} |`,
                '',
                '### Core Web Vitals',
                `- **LCP**: ${Number.isFinite(lcp) ? `${Math.round(lcp)}ms` : 'Not reported'}`,
                `- **FID**: ${Number.isFinite(fid) ? `${Math.round(fid)}ms` : 'Not reported'}`,
                `- **CLS**: ${Number.isFinite(cls) ? cls.toFixed(3) : 'Not reported'}`,
                '',
                '### Run Context',
                `- **Tested URL**: ${testedUrl}`,
                '- **Note**: This localhost address is only reachable inside this GitHub Actions runner.'
              ];

              if (runUrl) {
                commentLines.push(`- **Workflow run**: [View run details](${runUrl})`);
              }

              commentLines.push('- **Full Lighthouse reports**: Attached to this workflow run as artifacts (HTML + JSON).');

              const comment = commentLines.join('\n');

              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100
              });

              const existingComment = comments.data.find(c =>
                c.user?.login === 'github-actions[bot]' && c.body?.includes(reportTitle)
              );

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: comment
                });
              } else {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }

              return;
            }

            core.info('No Lighthouse result JSON with categories and audits found; skipping performance comment.');

  vercel-preview-lighthouse:
    name: Vercel Preview Lighthouse
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'deployment_status' &&
      github.event.deployment_status.state == 'success' &&
      (github.event.deployment.environment == 'Preview' || github.event.deployment.environment == 'preview') &&
      github.event.deployment_status.environment_url
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify Vercel preview URL bypass
        env:
          DEPLOYMENT_URL: ${{ github.event.deployment_status.environment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail

          header_args=()
          if [ -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
            header_args+=(--header "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}")
          else
            echo "::warning::VERCEL_AUTOMATION_BYPASS_SECRET is not configured; preflight will run without bypass headers."
          fi

          final_url="$(curl -LsS -o /dev/null -w '%{url_effective}' "${header_args[@]}" "${DEPLOYMENT_URL}")"

          echo "Requested deployment URL: ${DEPLOYMENT_URL}"
          echo "Final deployment URL: ${final_url}"

          if [[ "${final_url}" == https://vercel.com/login* || "${final_url}" == *"//vercel.com/login"* ]]; then
            echo "::error::Vercel preview URL resolved to a login redirect. Configure VERCEL_AUTOMATION_BYPASS_SECRET for Lighthouse automation."
            exit 1
          fi

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        with:
          configPath: './lighthouserc.cjs'
          urls: |
            ${{ github.event.deployment_status.environment_url }}
          uploadArtifacts: false
          temporaryPublicStorage: true

      - name: Upload Lighthouse Results
        uses: actions/upload-artifact@v7
        if: always() && steps.lighthouse.outcome != 'skipped'
        with:
          name: lighthouse-reports-vercel-preview-${{ github.run_id }}
          path: |
            ${{ steps.lighthouse.outputs.resultsPath || '.lighthouseci' }}/*.html
            ${{ steps.lighthouse.outputs.resultsPath || '.lighthouseci' }}/*.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 30

      - name: Comment PR with Vercel preview Lighthouse results
        uses: actions/github-script@v9
        env:
          LIGHTHOUSE_RESULTS_PATH: ${{ steps.lighthouse.outputs.resultsPath }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const deploymentSha = context.payload.deployment?.sha || context.sha;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: deploymentSha
            });

            const targetPr = prs.data.find(pr => pr.state === 'open') || prs.data[0];
            if (!targetPr) {
              core.info('No pull request associated with this deployment commit; skipping performance comment.');
              return;
            }

            const resultsPath = process.env.LIGHTHOUSE_RESULTS_PATH || path.join(process.cwd(), '.lighthouseci');
            if (!fs.existsSync(resultsPath)) {
              core.info(`No Lighthouse results directory found at ${resultsPath}; skipping performance comment.`);
              return;
            }

            const jsonFiles = fs
              .readdirSync(resultsPath)
              .filter(file => file.endsWith('.json'));

            for (const file of jsonFiles) {
              const result = JSON.parse(fs.readFileSync(path.join(resultsPath, file), 'utf8'));
              const lhr = result.lhr || result;

              if (!lhr.categories || !lhr.audits) {
                core.info(`Skipping ${file}; it is not a Lighthouse result file.`);
                continue;
              }

              const scores = lhr.categories;
              const scorePercent = category => Math.round(category.score * 100);
              const auditNumber = auditName => lhr.audits[auditName]?.numericValue;
              const lcp = auditNumber('largest-contentful-paint');
              const fid = auditNumber('max-potential-fid');
              const cls = auditNumber('cumulative-layout-shift');
              const requestedDeployment = context.payload.deployment_status?.environment_url || 'Not reported';
              const finalAuditedUrl = lhr.finalDisplayedUrl || lhr.finalUrl || 'Not reported';
              const runUrl =
                context.serverUrl && context.repo?.owner && context.repo?.repo && context.runId
                  ? `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                  : null;
              const reportTitle = 'Performance Report: Vercel Preview Deployment';

              const commentLines = [
                `## ${reportTitle}`,
                '',
                '| Metric | Score | Status |',
                '|--------|-------|--------|',
                `| Performance | ${scorePercent(scores.performance)} | ${scores.performance.score >= 0.9 ? 'Pass' : scores.performance.score >= 0.8 ? 'Warn' : 'Fail'} |`,
                `| Accessibility | ${scorePercent(scores.accessibility)} | ${scores.accessibility.score >= 0.9 ? 'Pass' : 'Fail'} |`,
                `| Best Practices | ${scorePercent(scores['best-practices'])} | ${scores['best-practices'].score >= 0.9 ? 'Pass' : 'Fail'} |`,
                `| SEO | ${scorePercent(scores.seo)} | ${scores.seo.score >= 0.9 ? 'Pass' : 'Fail'} |`,
                '',
                '### Core Web Vitals',
                `- **LCP**: ${Number.isFinite(lcp) ? `${Math.round(lcp)}ms` : 'Not reported'}`,
                `- **FID**: ${Number.isFinite(fid) ? `${Math.round(fid)}ms` : 'Not reported'}`,
                `- **CLS**: ${Number.isFinite(cls) ? cls.toFixed(3) : 'Not reported'}`,
                '',
                '### Run Context',
                `- **Requested deployment**: ${requestedDeployment}`,
                `- **Final audited URL**: ${finalAuditedUrl}`
              ];

              if (runUrl) {
                commentLines.push(`- **Workflow run**: [View run details](${runUrl})`);
              }

              commentLines.push('- **Full Lighthouse reports**: Attached to this workflow run as artifacts (HTML + JSON).');

              const comment = commentLines.join('\n');

              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: targetPr.number,
                per_page: 100
              });

              const existingComment = comments.data.find(c =>
                c.user?.login === 'github-actions[bot]' && c.body?.includes(reportTitle)
              );

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: comment
                });
              } else {
                await github.rest.issues.createComment({
                  issue_number: targetPr.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }

              return;
            }

            core.info('No Lighthouse result JSON with categories and audits found; skipping performance comment.');
