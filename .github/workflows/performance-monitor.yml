name: Performance Monitoring

on:
  deployment_status:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.deployment.id || github.ref }}
  cancel-in-progress: true

jobs:
  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    if: >-
      github.event.deployment_status.state == 'success' &&
      (github.event.deployment.environment == 'Preview' || github.event.deployment.environment == 'preview') &&
      github.event.deployment_status.environment_url
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.json'
          urls: |
            ${{ github.event.deployment_status.environment_url }}
          uploadArtifacts: false
          temporaryPublicStorage: true

      - name: Upload Lighthouse Results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: lighthouse-reports-${{ github.run_id }}
          path: |
            .lighthouseci/**/*.html
            .lighthouseci/**/*.json
          retention-days: 30

      - name: Comment PR with Lighthouse results
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const deploymentSha = context.payload.deployment?.sha || context.sha;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: deploymentSha
            });

            const targetPr = prs.data.find(pr => pr.state === 'open') || prs.data[0];
            if (!targetPr) {
              core.info('No pull request associated with this deployment commit; skipping performance comment.');
              return;
            }

            const resultsPath = path.join(process.cwd(), '.lighthouseci');
            if (!fs.existsSync(resultsPath)) {
              core.info('No .lighthouseci directory found; skipping performance comment.');
              return;
            }

            const jsonFiles = fs
              .readdirSync(resultsPath)
              .filter(file => file.endsWith('.json'));

            for (const file of jsonFiles) {
              const result = JSON.parse(fs.readFileSync(path.join(resultsPath, file), 'utf8'));
              const lhr = result.lhr || result;

              if (!lhr.categories || !lhr.audits) {
                core.info(`Skipping ${file}; it is not a Lighthouse result file.`);
                continue;
              }

              const scores = lhr.categories;
              const scorePercent = category => Math.round(category.score * 100);
              const auditNumber = auditName => lhr.audits[auditName]?.numericValue;
              const lcp = auditNumber('largest-contentful-paint');
              const fid = auditNumber('max-potential-fid');
              const cls = auditNumber('cumulative-layout-shift');
              const testedUrl = context.payload.deployment_status?.environment_url || lhr.finalDisplayedUrl || lhr.finalUrl || 'Not reported';
              const runUrl =
                context.serverUrl && context.repo?.owner && context.repo?.repo && context.runId
                  ? `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                  : null;
              const runLink = runUrl
                ? `- **Workflow run**: [View run details](${runUrl})\n`
                : '';

              const comment = `## Performance Report

              | Metric | Score | Status |
              |--------|-------|--------|
              | Performance | ${scorePercent(scores.performance)} | ${scores.performance.score >= 0.9 ? 'Pass' : scores.performance.score >= 0.8 ? 'Warn' : 'Fail'} |
              | Accessibility | ${scorePercent(scores.accessibility)} | ${scores.accessibility.score >= 0.9 ? 'Pass' : 'Fail'} |
              | Best Practices | ${scorePercent(scores['best-practices'])} | ${scores['best-practices'].score >= 0.9 ? 'Pass' : 'Fail'} |
              | SEO | ${scorePercent(scores.seo)} | ${scores.seo.score >= 0.9 ? 'Pass' : 'Fail'} |

              ### Core Web Vitals
              - **LCP**: ${Number.isFinite(lcp) ? `${Math.round(lcp)}ms` : 'Not reported'}
              - **FID**: ${Number.isFinite(fid) ? `${Math.round(fid)}ms` : 'Not reported'}
              - **CLS**: ${Number.isFinite(cls) ? cls.toFixed(3) : 'Not reported'}

              ### Run Context
              - **Tested URL**: ${testedUrl}
              ${runLink}- **Full Lighthouse reports**: Attached to this workflow run as artifacts (HTML + JSON).`;

              await github.rest.issues.createComment({
                issue_number: targetPr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });

              return;
            }

            core.info('No Lighthouse result JSON with categories and audits found; skipping performance comment.');
