name: CI/CD Pipeline

on:
  push:
    branches: [main, preview]
  pull_request:
    branches: [main, preview]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint and Type Check
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run ESLint
        run: pnpm run lint

      - name: Run TypeScript type check
        run: pnpm run type-check

      - name: Check Prettier formatting
        run: pnpm run format:check

  # Build and Test
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build application
        run: pnpm run build:ci
        env:
          NODE_ENV: production
          RESEND_API_KEY: 'dummy_key_for_build'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-files
          path: .next/
          retention-days: 7

  # Performance Check
  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install-command: ''

      - name: Download build artifacts
        id: download-artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-files
          path: .next/
        continue-on-error: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application (if artifacts not available)
        run: pnpm run build:ci
        if: steps.download-artifacts.outcome == 'failure'
        env:
          NODE_ENV: production
          RESEND_API_KEY: 'dummy_key_for_build'

      - name: Start application
        run: |
          pnpm start:prod &
          sleep 10

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: false
          temporaryPublicStorage: true

      - name: Upload Lighthouse Results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: lighthouse_results
          path: .lighthouseci/
          retention-days: 30

  # Note: Vercel handles deployment automatically
  # No need for GitHub Actions deployment since Vercel auto-deploys on push
