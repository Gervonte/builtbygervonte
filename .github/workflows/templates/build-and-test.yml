name: Build and Test

on:
  workflow_call:
    inputs:
      build-command:
        description: 'Build command to run'
        required: false
        type: string
        default: 'pnpm run build:ci'
      test-commands:
        description: 'Test commands to run (space-separated)'
        required: false
        type: string
        default: 'pnpm run lint pnpm run type-check pnpm run format:check'
      upload-artifacts:
        description: 'Whether to upload build artifacts'
        required: false
        type: boolean
        default: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run tests
        run: |
          # Split test-commands by newline and run each command safely
          echo "${{ inputs.test-commands }}" | while IFS= read -r cmd; do
            if [ -n "$cmd" ]; then
              echo "Running: $cmd"
              # Validate command contains only safe characters (alphanumeric, spaces, hyphens, underscores, dots, slashes)
              if echo "$cmd" | grep -qE '^[a-zA-Z0-9\s\-_./]+$'; then
                $cmd
              else
                echo "Error: Command contains potentially unsafe characters: $cmd"
                exit 1
              fi
            fi
          done

      - name: Build application
        run: |
          echo "Building: ${{ inputs.build-command }}"
          # Validate build command contains only safe characters
          if echo "${{ inputs.build-command }}" | grep -qE '^[a-zA-Z0-9\s\-_./]+$'; then
            ${{ inputs.build-command }}
          else
            echo "Error: Build command contains potentially unsafe characters: ${{ inputs.build-command }}"
            exit 1
          fi
        env:
          NODE_ENV: production
          RESEND_API_KEY: 'dummy_key_for_build'

      - name: Upload build artifacts
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v6
        with:
          name: build-files
          path: .next/
          retention-days: 7
