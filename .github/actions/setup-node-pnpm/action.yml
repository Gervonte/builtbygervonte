name: Setup Node.js and pnpm
description: Install repo-pinned Node.js and pnpm with pnpm store caching.

inputs:
  install-command:
    description: Install command to run after setup. Leave empty to skip install.
    required: false
    default: pnpm install --frozen-lockfile --config.minimum-release-age=0

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version-file: .nvmrc
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      if: inputs.install-command != ''
      shell: bash
      run: ${{ inputs.install-command }}
      env:
        PNPM_CONFIG_MINIMUM_RELEASE_AGE: '0'
